<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>웹캠 사람 운동 분석</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #f9fafb;
    }

    /* 제목 영역: 카메라 화면 위에 반투명으로 표시 */
    header {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 30;
      width: min(520px, calc(100vw - 32px));
      padding: 14px 18px;
      background: rgba(2, 6, 23, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      backdrop-filter: blur(10px);
    }

    header h1 {
      margin: 0 0 6px 0;
      font-size: 24px;
    }

    header p {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    /* 전체 화면 레이아웃 */
    main {
      position: fixed;
      inset: 0;
      display: block;
      padding: 0;
      overflow: hidden;
    }

    /* 카메라 영역 전체화면 */
    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: none;
      margin: 0;
      background: #000;
      border: 0;
      border-radius: 0;
      overflow: hidden;
    }

    /* 웹캠과 오버레이 캔버스를 화면 전체에 맞춤 */
    video,
    canvas {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 궤적/골격선은 카메라 위에 겹쳐서 표시 */
    #overlay {
      pointer-events: none;
      z-index: 10;
    }

    /* 오른쪽 조작 패널을 카메라 위에 띄움 */
    .panel {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 40;
      width: 340px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: rgba(2, 6, 23, 0.76);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .panel h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    #startBtn {
      background: #22c55e;
      color: #052e16;
    }

    #stopBtn {
      background: #ef4444;
      color: #fff;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .hint {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    #status {
      font-size: 14px;
      color: #facc15;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .person-card {
      border: 1px solid #334155;
      border-left-width: 7px;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #0f172a;
    }

    .person-card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 15px;
    }

    .person-card div {
      font-size: 14px;
      color: #e2e8f0;
      line-height: 1.6;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }

    /* 작은 화면에서는 패널을 아래쪽으로 이동 */
    @media (max-width: 900px) {
      header {
        left: 10px;
        top: 10px;
        width: calc(100vw - 20px);
        padding: 12px 14px;
      }

      header h1 {
        font-size: 18px;
      }

      header p {
        font-size: 12px;
      }

      .panel {
        left: 10px;
        right: 10px;
        top: auto;
        bottom: 10px;
        width: auto;
        max-height: 42vh;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>웹캠 사람 운동 분석</h1>
    <p>사람의 중심 이동을 추적하여 최근 10초 궤적, 속도, 가속도를 표시합니다.</p>
  </header>

  <main>
    <section class="stage">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </section>

    <aside class="panel">
      <h2>측정 제어</h2>

      <div class="controls">
        <button id="startBtn">카메라 시작</button>
        <button id="stopBtn" disabled>정지</button>
      </div>

      <div class="hint">
        실제 단위 보정값은 <b>config.json</b>의 <b>meterPixels</b>에서 설정합니다.<br>
        <span id="configInfo">설정값을 불러오는 중입니다.</span>
      </div>

      <div id="status">모델을 불러오는 중입니다.</div>

      <h2>실시간 분석값</h2>
      <div id="metrics">
        아직 측정값이 없습니다.
      </div>
    </aside>
  </main>

  <script type="module">
    import {
      PoseLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");
    const metricsEl = document.getElementById("metrics");
    const configInfoEl = document.getElementById("configInfo");

    let poseLandmarker = null;
    let stream = null;
    let running = false;

    /*
      설정값은 config.json에서 불러옵니다.

      meterPixels:
      - null 또는 0 이하: px/s, px/s² 단위로 표시
      - 300처럼 양수: 화면에서 1m가 300px이라는 뜻이며, m/s, m/s²로 표시

      configRefreshMs:
      - GitHub Pages에서 config.json 수정 후 새로고침 없이 반영하고 싶을 때 사용하는 설정입니다.
      - GitHub Pages 반영/캐시 지연이 있을 수 있으므로, 즉시 반영이 필요하면 브라우저 새로고침을 권장합니다.
    */
    const DEFAULT_CONFIG = {
      meterPixels: null,
      trailSeconds: 10,
      configRefreshMs: 5000
    };

    let appConfig = { ...DEFAULT_CONFIG };
    let TRAIL_MS = DEFAULT_CONFIG.trailSeconds * 1000;

    const TRACK_ALIVE_MS = 1200;
    const MIN_LANDMARK_VISIBILITY = 0.35;

    let nextTrackId = 1;
    const tracks = new Map();

    const COLORS = [
      "#ff3b30", "#34c759", "#007aff", "#ffcc00",
      "#af52de", "#ff9500", "#00c7be", "#ff2d55"
    ];

    const POSE_CONNECTIONS = [
      [11, 12],
      [11, 13], [13, 15],
      [12, 14], [14, 16],
      [11, 23], [12, 24],
      [23, 24],
      [23, 25], [25, 27], [27, 29], [29, 31],
      [24, 26], [26, 28], [28, 30], [30, 32],
      [15, 17], [15, 19], [15, 21],
      [16, 18], [16, 20], [16, 22]
    ];

    async function loadConfig() {
      try {
        const cacheBuster = Date.now();
        const response = await fetch(`./config.json?v=${cacheBuster}`, {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`config.json HTTP ${response.status}`);
        }

        const config = await response.json();
        appConfig = normalizeConfig(config);
        applyConfig();

        console.log("config.json 로드 완료:", appConfig);
      } catch (err) {
        console.warn("config.json을 불러오지 못해 기본 설정을 사용합니다.", err);
        appConfig = { ...DEFAULT_CONFIG };
        applyConfig();
      }
    }

    function normalizeConfig(config) {
      const meterPixels = Number(config.meterPixels);
      const trailSeconds = Number(config.trailSeconds);
      const configRefreshMs = Number(config.configRefreshMs);

      return {
        meterPixels:
          Number.isFinite(meterPixels) && meterPixels > 0
            ? meterPixels
            : null,
        trailSeconds:
          Number.isFinite(trailSeconds) && trailSeconds > 0
            ? trailSeconds
            : DEFAULT_CONFIG.trailSeconds,
        configRefreshMs:
          Number.isFinite(configRefreshMs) && configRefreshMs >= 1000
            ? configRefreshMs
            : DEFAULT_CONFIG.configRefreshMs
      };
    }

    function applyConfig() {
      TRAIL_MS = appConfig.trailSeconds * 1000;

      if (appConfig.meterPixels) {
        configInfoEl.innerHTML =
          `현재 보정값: <b>1m = ${appConfig.meterPixels}px</b><br>` +
          `속도/가속도는 m/s, m/s²로 표시됩니다.`;
      } else {
        configInfoEl.innerHTML =
          `현재 보정값: <b>사용 안 함</b><br>` +
          `속도/가속도는 px/s, px/s²로 표시됩니다.`;
      }
    }

    async function initPoseLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
      );

      const options = {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numPoses: 6,
        minPoseDetectionConfidence: 0.45,
        minPosePresenceConfidence: 0.45,
        minTrackingConfidence: 0.45
      };

      try {
        poseLandmarker = await PoseLandmarker.createFromOptions(vision, options);
      } catch (err) {
        console.warn("GPU 초기화 실패, CPU로 재시도합니다.", err);
        delete options.baseOptions.delegate;
        poseLandmarker = await PoseLandmarker.createFromOptions(vision, options);
      }

      statusEl.textContent = "모델 준비 완료. 카메라 시작을 누르세요.";
      startBtn.disabled = false;
    }

    async function requestBrowserFullscreen() {
      try {
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen();
        }
      } catch (e) {
        console.log("전체화면 전환이 차단되었습니다. 브라우저 정책상 정상일 수 있습니다.", e);
      }
    }

    async function startCamera() {
      if (!poseLandmarker) {
        statusEl.textContent = "아직 모델을 불러오는 중입니다.";
        return;
      }

      try {
        /*
          전체화면은 브라우저 정책상 버튼 클릭 같은 사용자 동작 직후에 잘 작동합니다.
          그래서 카메라 시작 버튼을 누른 직후 전체화면 전환을 먼저 시도합니다.
        */
        await requestBrowserFullscreen();

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30 }
          },
          audio: false
        });

        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = resolve;
        });

        await video.play();

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        /*
          일부 브라우저에서는 카메라 권한 허용 후 전체화면 요청이 더 잘 작동할 수 있어
          한 번 더 전체화면 전환을 시도합니다.
        */
        await requestBrowserFullscreen();

        running = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;

        statusEl.textContent = "측정 중입니다. 사람의 중심 이동 궤적이 최근 설정 시간 동안 표시됩니다.";
        requestAnimationFrame(renderLoop);
      } catch (err) {
        console.error(err);
        statusEl.textContent =
          "카메라를 열 수 없습니다. 브라우저 카메라 권한, HTTPS/localhost 실행 여부를 확인하세요.";
      }
    }

    async function stopCamera() {
      running = false;

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      tracks.clear();

      startBtn.disabled = false;
      stopBtn.disabled = true;
      metricsEl.textContent = "측정이 정지되었습니다.";
      statusEl.textContent = "정지됨. 다시 시작할 수 있습니다.";

      try {
        if (document.fullscreenElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (e) {
        console.log("전체화면 종료가 차단되었습니다.", e);
      }
    }

    function renderLoop() {
      if (!running) return;

      const now = performance.now();

      if (video.readyState >= 2) {
        const result = poseLandmarker.detectForVideo(video, now);
        const landmarks = result.landmarks || [];

        updateTracks(landmarks, now);
        removeOldTrailPoints(now);
        drawScene(now);
        updateMetrics(now);
      }

      requestAnimationFrame(renderLoop);
    }

    function updateTracks(poses, now) {
      const detections = poses
        .map(pose => {
          const center = getPoseCenter(pose);
          return center ? { landmarks: pose, center } : null;
        })
        .filter(Boolean);

      const usedTrackIds = new Set();
      const maxMatchDistance = Math.max(canvas.width, canvas.height) * 0.16;

      for (const det of detections) {
        let bestTrack = null;
        let bestDistance = Infinity;

        for (const track of tracks.values()) {
          if (usedTrackIds.has(track.id)) continue;
          if (now - track.lastSeen > TRACK_ALIVE_MS) continue;

          const d = distance(det.center.x, det.center.y, track.x, track.y);

          if (d < bestDistance) {
            bestDistance = d;
            bestTrack = track;
          }
        }

        if (!bestTrack || bestDistance > maxMatchDistance) {
          bestTrack = createTrack(det.center, now);
          tracks.set(bestTrack.id, bestTrack);
        }

        usedTrackIds.add(bestTrack.id);
        updateSingleTrack(bestTrack, det.center, det.landmarks, now);
      }
    }

    function createTrack(center, now) {
      const id = nextTrackId++;

      return {
        id,
        color: COLORS[(id - 1) % COLORS.length],
        x: center.x,
        y: center.y,
        lastX: center.x,
        lastY: center.y,
        vx: 0,
        vy: 0,
        lastVx: 0,
        lastVy: 0,
        speed: 0,
        accel: 0,
        lastT: now,
        lastSeen: now,
        landmarks: null,
        points: [{ x: center.x, y: center.y, t: now }]
      };
    }

    function updateSingleTrack(track, center, landmarks, now) {
      const dt = Math.max((now - track.lastT) / 1000, 1 / 60);
      const rawVx = (center.x - track.x) / dt;
      const rawVy = (center.y - track.y) / dt;

      const movement = distance(center.x, center.y, track.x, track.y);

      let vx = rawVx;
      let vy = rawVy;

      if (movement < 2.5) {
        vx = 0;
        vy = 0;
      }

      const smoothing = 0.35;

      track.lastVx = track.vx;
      track.lastVy = track.vy;

      track.vx = smoothing * vx + (1 - smoothing) * track.vx;
      track.vy = smoothing * vy + (1 - smoothing) * track.vy;

      const ax = (track.vx - track.lastVx) / dt;
      const ay = (track.vy - track.lastVy) / dt;

      track.speed = Math.hypot(track.vx, track.vy);
      track.accel = Math.hypot(ax, ay);

      track.lastX = track.x;
      track.lastY = track.y;
      track.x = center.x;
      track.y = center.y;
      track.lastT = now;
      track.lastSeen = now;
      track.landmarks = landmarks;

      track.points.push({
        x: center.x,
        y: center.y,
        t: now
      });
    }

    function getPoseCenter(landmarks) {
      let sumX = 0;
      let sumY = 0;
      let count = 0;

      for (const lm of landmarks) {
        const visibility = lm.visibility ?? 1;

        if (visibility >= MIN_LANDMARK_VISIBILITY) {
          sumX += clamp(lm.x, 0, 1) * canvas.width;
          sumY += clamp(lm.y, 0, 1) * canvas.height;
          count++;
        }
      }

      if (count < 8) return null;

      return {
        x: sumX / count,
        y: sumY / count
      };
    }

    function removeOldTrailPoints(now) {
      for (const [id, track] of tracks.entries()) {
        track.points = track.points.filter(p => now - p.t <= TRAIL_MS);

        if (track.points.length === 0 && now - track.lastSeen > TRAIL_MS) {
          tracks.delete(id);
        }
      }
    }

    function drawScene(now) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const track of tracks.values()) {
        drawTrail(track, now);

        if (now - track.lastSeen < 300 && track.landmarks) {
          drawSkeleton(track);
          drawLabel(track);
        }
      }
    }

    function drawTrail(track, now) {
      const points = track.points.filter(p => now - p.t <= TRAIL_MS);
      if (points.length < 2) return;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = 12;
      ctx.strokeStyle = track.color;
      ctx.globalAlpha = 0.9;

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);

      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }

      ctx.stroke();
      ctx.restore();

      const last = points[points.length - 1];

      ctx.save();
      ctx.fillStyle = track.color;
      ctx.globalAlpha = 0.95;
      ctx.beginPath();
      ctx.arc(last.x, last.y, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSkeleton(track) {
      const landmarks = track.landmarks;

      ctx.save();
      ctx.strokeStyle = track.color;
      ctx.fillStyle = track.color;
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.globalAlpha = 0.85;

      for (const [a, b] of POSE_CONNECTIONS) {
        const p1 = landmarks[a];
        const p2 = landmarks[b];

        if (!isVisible(p1) || !isVisible(p2)) continue;

        ctx.beginPath();
        ctx.moveTo(p1.x * canvas.width, p1.y * canvas.height);
        ctx.lineTo(p2.x * canvas.width, p2.y * canvas.height);
        ctx.stroke();
      }

      for (const lm of landmarks) {
        if (!isVisible(lm)) continue;

        ctx.beginPath();
        ctx.arc(lm.x * canvas.width, lm.y * canvas.height, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawLabel(track) {
      const { speedText, accelText } = getMotionText(track);

      ctx.save();
      ctx.font = "bold 18px system-ui";
      ctx.textBaseline = "top";

      const text1 = `사람 ${track.id}`;
      const text2 = `v ${speedText}`;
      const text3 = `a ${accelText}`;

      const x = clamp(track.x + 14, 8, canvas.width - 210);
      const y = clamp(track.y - 54, 8, canvas.height - 80);

      ctx.fillStyle = "rgba(2, 6, 23, 0.72)";
      ctx.fillRect(x - 8, y - 6, 210, 76);

      ctx.fillStyle = track.color;
      ctx.fillText(text1, x, y);

      ctx.fillStyle = "#ffffff";
      ctx.fillText(text2, x, y + 24);
      ctx.fillText(text3, x, y + 48);

      ctx.restore();
    }

    function updateMetrics(now) {
      const activeTracks = [...tracks.values()]
        .filter(track => now - track.lastSeen < 1000)
        .sort((a, b) => a.id - b.id);

      if (activeTracks.length === 0) {
        metricsEl.textContent = "감지된 사람이 없습니다.";
        return;
      }

      metricsEl.innerHTML = activeTracks.map(track => {
        const { speedText, accelText } = getMotionText(track);
        const x = Math.round(track.x);
        const y = Math.round(track.y);

        return `
          <div class="person-card" style="border-left-color:${track.color}">
            <strong style="color:${track.color}">사람 ${track.id}</strong>
            <div>중심 위치: (${x}, ${y}) px</div>
            <div>속도: ${speedText}</div>
            <div>가속도: ${accelText}</div>
            <div class="small">궤적 유지: 최근 ${appConfig.trailSeconds}초</div>
          </div>
        `;
      }).join("");
    }

    function getMotionText(track) {
      const meterPixels = appConfig.meterPixels;

      if (Number.isFinite(meterPixels) && meterPixels > 0) {
        const speedM = track.speed / meterPixels;
        const accelM = track.accel / meterPixels;

        return {
          speedText: `${speedM.toFixed(2)} m/s`,
          accelText: `${accelM.toFixed(2)} m/s²`
        };
      }

      return {
        speedText: `${track.speed.toFixed(0)} px/s`,
        accelText: `${track.accel.toFixed(0)} px/s²`
      };
    }

    function isVisible(lm) {
      return lm && (lm.visibility ?? 1) >= MIN_LANDMARK_VISIBILITY;
    }

    function distance(x1, y1, x2, y2) {
      return Math.hypot(x1 - x2, y1 - y2);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    startBtn.disabled = true;
    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", stopCamera);

    await loadConfig();

    setInterval(() => {
      loadConfig();
    }, appConfig.configRefreshMs);

    initPoseLandmarker();
  </script>
</body>
</html>
